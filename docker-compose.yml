services:

  web:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: otakustore
      DB_USER: otakustore_user
      DB_PASS: otakustore_pass
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - imagenes:/var/www/html/assets/img
    restart: unless-stopped

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root_pass_segura
      MYSQL_DATABASE: otakustore
      MYSQL_USER: otakustore_user
      MYSQL_PASSWORD: otakustore_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./includes/otakustore.sql:/docker-entrypoint-initdb.d/otakustore.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
  imagenes:
